<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Bilgi Tabanı</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
  :root {
    --bg:#0d0f14; --bg2:#13161d; --bg3:#1a1e28;
    --border:#252a38; --text:#c9d1e0; --text-dim:#5a6480;
    --text-bright:#e8edf8; --accent:#4fc3f7;
    --accent2:#81c784; --accent3:#ffb74d; --accent-purple:#ce93d8;
    --shadow:rgba(0,0,0,0.4);
    --node-root:#1a2540; --node-l1:#1a2030; --node-l2:#151e15; --node-l3:#1e1a10; --node-l4:#1a1525;
    --highlight-bg:rgba(255,183,77,0.25);
    --link-stroke:var(--text-dim); --link-stroke-highlight:var(--text-bright);
    --search-width:320px; --detail-width:450px;
  }
  [data-theme="light"] {
    --bg:#f8f9fa; --bg2:#ffffff; --bg3:#f1f3f5;
    --border:#dee2e6; --text:#343a40; --text-dim:#6c757d;
    --text-bright:#212529; --accent:#0277bd;
    --accent2:#2e7d32; --accent3:#e65100; --accent-purple:#6a1b9a;
    --shadow:rgba(0,0,0,0.08);
    --node-root:#e3f2fd; --node-l1:#f3e5f5; --node-l2:#e8f5e9; --node-l3:#fff8e1; --node-l4:#fce4ec;
    --highlight-bg:rgba(230,81,0,0.2);
  }

  *{margin:0;padding:0;box-sizing:border-box;transition:background-color 0.3s,border-color 0.3s;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  body.resizing{cursor:ew-resize !important;user-select:none;}
  body.resizing svg{pointer-events:none !important;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:50px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:10;box-shadow:0 2px 10px var(--shadow);}
  .header-left{display:flex;align-items:center;gap:20px;}
  .header-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;}
  .search-wrapper{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 6px;transition:0.2s;position:relative;}
  .search-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,195,247,0.2);}
  .search-icon-deco{font-size:12px;color:var(--text-dim);padding-left:6px;pointer-events:none;}
  #search-input{background:transparent;border:none;color:var(--text-bright);padding:6px 6px 6px 8px;font-family:inherit;font-size:12px;width:220px;outline:none;transition:all 0.2s;}
  #search-input:focus{width:260px;}
  .action-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:0.2s;}
  .action-btn:hover{color:var(--accent);background:var(--bg3);}
  #search-clear{display:none;}
  .header-right{display:flex;align-items:center;gap:15px;}
  .theme-toggle{background:none;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-family:inherit;}
  .theme-toggle:hover{background:var(--bg3);color:var(--accent);}

  /* LAYOUT */
  .main{display:flex;flex:1;overflow:hidden;position:relative;}
  .resizer{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;background:transparent;z-index:100;transition:background 0.2s;}
  .resizer:hover,.resizer:active{background:rgba(79,195,247,0.3);}
  .resizer-left{right:0;} .resizer-right{left:0;}

  /* SOL: ARAMA PANELİ */
  #search-panel{width:var(--search-width);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),margin-left 0.3s;z-index:15;position:relative;margin-left:0;}
  #search-panel.closed{margin-left:calc(-1 * var(--search-width));}
  .search-panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--bg3);font-size:12px;color:var(--text-dim);}
  .search-panel-info{display:flex;gap:8px;align-items:center;}
  .search-count{font-weight:bold;color:var(--text-bright);}
  .search-panel-close-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:0.2s;}
  .search-panel-close-btn:hover{background:var(--bg3);color:var(--accent3);border-color:var(--accent3);}
  .search-results-container{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
  .search-results-container::-webkit-scrollbar{width:4px;}
  .search-results-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .search-group{margin-bottom:8px;border-bottom:1px solid transparent;}
  .search-group-title{padding:6px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--accent);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;border-radius:4px;margin:0 8px;}
  .search-group-title:hover{background:var(--bg3);}
  .search-group-title.active-snippet{background:var(--bg3);color:var(--text-bright);}
  .search-group-title .badge{font-size:10px;background:var(--bg3);padding:2px 6px;border-radius:10px;color:var(--text-dim);border:1px solid var(--border);}
  .search-snippet{margin:4px 16px 4px 24px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;color:var(--text);line-height:1.5;position:relative;overflow:hidden;transition:0.2s;}
  .search-snippet:hover{border-color:var(--accent3);box-shadow:0 2px 5px var(--shadow);}
  .search-snippet::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent3);opacity:0.5;}
  .search-snippet.active-snippet{border-color:var(--accent);background:var(--bg3);box-shadow:0 0 0 1px var(--accent);}
  .highlight{background:var(--highlight-bg);color:var(--accent3);font-weight:600;border-radius:2px;padding:0 2px;}

  /* MİNDMAP */
  #mindmap-panel{flex:1;overflow:hidden;position:relative;}
  svg{width:100%;height:100%;cursor:grab;outline:none;}
  svg:active{cursor:grabbing;}
  .link{fill:none;stroke:var(--link-stroke);stroke-width:1.5px;opacity:0.4;transition:stroke 0.3s;}
  .link.highlighted{stroke:var(--link-stroke-highlight);stroke-width:2.5px;opacity:1;}
  .node{cursor:pointer;}
  .node-rect{rx:8px;ry:8px;filter:drop-shadow(0px 2px 4px var(--shadow));transition:filter 0.2s,stroke-width 0.2s,stroke 0.2s;}
  .node:hover .node-rect{filter:drop-shadow(0px 4px 8px var(--shadow)) brightness(1.2);}
  .node.search-match .node-rect{stroke:var(--accent3) !important;stroke-width:2.5px !important;}
  .node.kb-focus .node-rect{stroke:var(--accent) !important;stroke-width:2.5px !important;filter:drop-shadow(0 0 8px var(--accent));}
  .node-text{font-family:'JetBrains Mono',monospace;font-size:11px;fill:var(--text-bright);pointer-events:none;dominant-baseline:middle;}
  .node-root .node-rect{fill:var(--node-root);stroke:var(--accent);stroke-width:2px;}
  .node-root .node-text{fill:var(--accent);font-weight:600;font-size:13px;}
  .node-l1 .node-rect{fill:var(--node-l1);stroke:var(--accent);}
  .node-l2 .node-rect{fill:var(--node-l2);stroke:var(--accent2);}
  .node-l3 .node-rect{fill:var(--node-l3);stroke:var(--accent3);}
  .node-l4 .node-rect{fill:var(--node-l4);stroke:var(--accent-purple);}
  .content-indicator{fill:var(--accent2);}
  .collapse-indicator{fill:var(--text-dim);}

  .zoom-controls{position:absolute;bottom:20px;left:20px;display:flex;flex-direction:column;gap:8px;background:var(--bg2);padding:8px;border-radius:8px;border:1px solid var(--border);box-shadow:0 4px 12px var(--shadow);z-index:5;}
  .zoom-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:0.2s;}
  .zoom-btn:hover{background:var(--border);color:var(--accent);}

  /* SAĞ: DETAY PANELİ */
  #detail-panel{width:var(--detail-width);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);box-shadow:-4px 0 15px var(--shadow);z-index:20;position:relative;}
  #detail-panel.closed{transform:translateX(100%);position:absolute;right:0;height:100%;border-left:none;box-shadow:none;}
  [data-theme="dark"] #detail-panel{background-color:#1e1e1e !important;}
  [data-theme="dark"] #detail-panel .detail-header{background-color:#1e1e1e !important;}
  [data-theme="dark"] #detail-panel .md{color:rgb(218,218,218) !important;}
  [data-theme="light"] #detail-panel{background-color:#ffffff;}

  @media(max-width:900px){
    #search-panel{position:absolute;height:100%;z-index:25;width:320px;}
    #search-panel.closed{transform:translateX(-100%);margin-left:0;}
    #detail-panel{position:absolute;right:0;top:0;height:100%;width:100%;max-width:none;}
    .resizer{display:none;}
  }

  .detail-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);position:relative;background:var(--bg3);}
  .breadcrumb{font-size:10px;color:var(--text-dim);letter-spacing:.06em;margin-bottom:6px;}
  .bc-link{cursor:pointer;transition:color 0.2s;}
  .bc-link:hover{color:var(--accent);text-decoration:underline;}
  .bc-sep{margin:0 4px;color:var(--border);}
  .detail-header h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);padding-right:30px;}
  .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:0.2s;}
  .close-btn:hover{background:var(--border);color:var(--accent3);}
  .detail-body{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;scroll-behavior:smooth;}
  .detail-body::-webkit-scrollbar{width:6px;}
  .detail-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  /* MARKDOWN */
  .md{font-size:13px;line-height:1.6;color:var(--text);}
  .md h1,.md h2,.md h3,.md h4{font-family:'Syne',sans-serif;margin-top:1.5em;margin-bottom:0.5em;color:var(--text-bright);}
  .md h1{font-size:1.4em;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:5px;}
  .md h2{font-size:1.2em;color:var(--accent2);}
  .md h3{font-size:1.1em;color:var(--accent3);}
  .md p{margin-bottom:1em;}
  .md a{color:var(--accent);text-decoration:none;}
  .md ul,.md ol{margin-bottom:1em;padding-left:1.5em;}
  .md strong{color:var(--text-bright);font-weight:600;}
  .md blockquote{border-left:3px solid var(--accent3);padding:5px 15px;margin:1em 0;background:var(--bg3);border-radius:0 4px 4px 0;font-style:italic;}
  .md code{background:var(--bg3);color:var(--accent-purple);padding:2px 6px;border-radius:4px;font-size:0.9em;border:1px solid var(--border);}
  .code-block-wrapper{position:relative;margin:1em 0;}
  .md pre{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;}
  .md pre code{background:none;border:none;padding:0;color:var(--text-bright);font-size:0.9em;}
  .copy-btn{position:absolute;top:8px;right:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;transition:0.2s;font-family:inherit;}
  .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* YÜKLEME & HATA */
  .app-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity 0.4s;}
  .app-overlay.hidden{opacity:0;pointer-events:none;}
  .loader-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loader-text{font-size:12px;color:var(--text-dim);}
  .error-overlay{background:var(--bg2);border:1px solid var(--accent3);border-radius:8px;padding:30px 40px;text-align:center;max-width:500px;}
  .error-overlay h3{color:var(--accent3);font-family:'Syne',sans-serif;margin-bottom:12px;}
  .error-overlay p{font-size:12px;color:var(--text-dim);line-height:1.7;}
  .error-overlay code{color:var(--accent-purple);background:var(--bg3);padding:2px 6px;border-radius:3px;}
  .detail-loading{text-align:center;padding:30px;color:var(--text-dim);font-size:12px;}
  .detail-error{border:1px dashed var(--accent3);border-radius:8px;padding:20px;text-align:center;color:var(--accent3);font-size:12px;line-height:1.8;margin:20px 0;}
  .detail-error code{font-size:10px;color:var(--text-dim);}
  .detail-empty{text-align:center;padding:30px;color:var(--text-dim);font-size:12px;font-style:italic;}
</style>
</head>
<body>

<!-- YÜKLEME EKRANI -->
<div class="app-overlay" id="app-overlay">
  <div class="loader-spinner"></div>
  <div class="loader-text" id="overlay-text">index.json yükleniyor...</div>
</div>

<header>
  <div class="header-left">
    <div class="header-title">IR Bilgi Tabanı</div>
    <div class="search-wrapper">
      <span class="search-icon-deco">🔍</span>
      <input type="text" id="search-input" placeholder="Ara...">
      <button class="action-btn" id="search-clear" title="Aramayı Temizle">✕</button>
    </div>
  </div>
  <div class="header-right">
    <button class="theme-toggle" id="theme-btn">
      <span id="theme-icon">🌙</span> Koyu
    </button>
  </div>
</header>

<div class="main">
  <!-- SOL PANEL -->
  <div id="search-panel" class="closed">
    <div class="resizer resizer-left" id="rsz-left"></div>
    <div class="search-panel-header">
      <div class="search-panel-info">
        <span>Arama Sonuçları</span>
        <span class="search-count" id="search-count">0 Sonuç</span>
      </div>
      <button class="search-panel-close-btn" id="search-panel-close">✕</button>
    </div>
    <div class="search-results-container" id="search-results"></div>
  </div>

  <!-- ZOOM -->
  <div class="zoom-controls">
    <button class="zoom-btn" id="btn-zoom-in" title="Yakınlaştır">+</button>
    <button class="zoom-btn" id="btn-zoom-out" title="Uzaklaştır">-</button>
    <button class="zoom-btn" id="btn-zoom-reset" title="Sıfırla">⌂</button>
    <button class="zoom-btn" id="btn-toggle-all" title="Tümünü Aç/Kapat">↕</button>
  </div>

  <!-- MİNDMAP -->
  <div id="mindmap-panel"><svg id="svg" tabindex="0"></svg></div>

  <!-- SAĞ PANEL -->
  <div id="detail-panel" class="closed">
    <div class="resizer resizer-right" id="rsz-right"></div>
    <div class="detail-header">
      <div class="breadcrumb" id="d-bc">Ana Sayfa</div>
      <h2 id="d-title">İçerik</h2>
      <button class="close-btn" id="btn-close-detail">✕</button>
    </div>
    <div class="detail-body" id="d-body"></div>
  </div>
</div>

<script>
'use strict';

// ================================================================
// TEMA
// ================================================================
(function initTheme() {
  const t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-btn').innerHTML =
    t === 'dark' ? '<span>🌙</span> Koyu' : '<span>☀️</span> Açık';
})();

document.getElementById('theme-btn').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('theme-btn').innerHTML =
    next === 'dark' ? '<span>🌙</span> Koyu' : '<span>☀️</span> Açık';
});

// ================================================================
// OVERLAY / HATA YÖNETİMİ
// ================================================================
function showOverlay(text) {
  const ov = document.getElementById('app-overlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `<div class="loader-spinner"></div><div class="loader-text">${text}</div>`;
}

function hideOverlay() {
  document.getElementById('app-overlay').classList.add('hidden');
}

function showFatalError(msg, detail = '') {
  const ov = document.getElementById('app-overlay');
  ov.classList.remove('hidden');
  ov.innerHTML = `
    <div class="error-overlay">
      <h3>⚠ Yükleme Hatası</h3>
      <p>${msg}</p>
      ${detail ? `<p style="margin-top:10px"><code>${detail}</code></p>` : ''}
      <p style="margin-top:16px;font-size:11px;">
        Repo kökünde <code>index.json</code> dosyasının olduğundan emin olun.<br>
        Ardından sayfayı yenileyin.
      </p>
    </div>`;
}

// ================================================================
// ÖNBELLEK VE GLOBAL STATE
// ================================================================
const mdCache = new Map();   // path → markdown string
let root, svg, g, zoomBehavior;
let width, height;
let nodeCounter = 0;
let activeKbNode = null;
let isAllExpanded = false;
const duration = 250;

// Arama indeksi: sadece başlıklar (önce) + cache'e alınan içerikler (sonra)
const SEARCH_INDEX = new Map(); // nodeId → { name, type, path, content|null }
let searchWarmupPromise = null;
let searchWarmupDone = false;
let searchRequestToken = 0;

// ================================================================
// CANVAS ÖLÇÜM
// ================================================================
const _cv = document.createElement('canvas');
const _cx = _cv.getContext('2d');
function getTextWidth(text, fs) {
  _cx.font = `${fs}px "JetBrains Mono"`;
  return _cx.measureText(text).width;
}
function nodeWidth(d) {
  return Math.max(100, getTextWidth(d.data.name, d.depth === 0 ? 13 : 11) + 40);
}

// ================================================================
// INDEX.JSON YÜKLEME VE BAŞLATMA
// ================================================================
async function bootstrap() {
  showOverlay('index.json yükleniyor...');
  try {
    const res = await fetch('index.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data || typeof data !== 'object') throw new Error('Geçersiz JSON formatı');
    hideOverlay();
    initD3(data);
    loadSearchIndex();
  } catch (err) {
    showFatalError(
      'index.json dosyası yüklenemedi veya okunamadı.',
      err.message
    );
  }
}

async function loadSearchIndex() {
  try {
    const res = await fetch('search-index.json');
    if (!res.ok) return;
    const data = await res.json();
    if (!data || !Array.isArray(data.items)) return;
    data.items.forEach(item => {
      const node = findNodeBySlug(item.slug);
      if (!node) return;
      const entry = SEARCH_INDEX.get(node.id);
      if (!entry) return;
      entry.content = item.content || '';
    });
    searchWarmupDone = true;
  } catch (_) {
    // Hata olursa sessizce çık, warmup devreye girer
  }
}

// ================================================================
// D3 BAŞLATMA (verisi dışarıdan gelir)
// ================================================================
function initD3(data) {
  const panel = document.getElementById('mindmap-panel');
  width = panel.clientWidth;
  height = panel.clientHeight;

  svg = d3.select('#svg');
  g = svg.append('g');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.1, 3])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBehavior).on('dblclick.zoom', null);

  root = d3.hierarchy(data, d => d.children);
  root.x0 = height / 2;
  root.y0 = 0;
  root.eachBefore(d => { d.id = ++nodeCounter; });

  // Arama indeksini başlıklar ile oluştur
  root.each(d => {
    SEARCH_INDEX.set(d.id, {
      name: d.data.name,
      type: d.data.type,
      path: d.data.path || null,
      content: null
    });
  });

  // Başlangıçta sadece kök açık
  root.children && root.children.forEach(collapse);
  update(root);

  svg.transition().duration(0).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(width / 4, height / 2).scale(0.9)
  );

  checkUrlHash();

  // Panel boyutlandırınca haritayı yeniden ortala
  new ResizeObserver(() => {
    refreshViewportSize();
    if (activeKbNode && svg && svg.node()) {
      const currentScale = d3.zoomTransform(svg.node()).k;
      panToNode(activeKbNode, currentScale, 0);
    }
  }).observe(panel);
}

// ================================================================
// D3 AĞAÇ MANTIĞI
// ================================================================
function collapse(d) {
  if (d.children) { d._children = d.children; d.children = null; }
  if (d._children) d._children.forEach(collapse);
}

function expandAll(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  if (d.children) d.children.forEach(expandAll);
}

function getAllNodes(d, list = []) {
  list.push(d);
  if (d.children) d.children.forEach(c => getAllNodes(c, list));
  if (d._children) d._children.forEach(c => getAllNodes(c, list));
  return list;
}

function findNodeById(id) {
  return getAllNodes(root).find(n => n.id === id);
}

function findNodeBySlug(slug) {
  return getAllNodes(root).find(n => n.data.slug === slug);
}

function update(source, skipAnim = false) {
  const dur = skipAnim ? 0 : duration;
  const treeLayout = d3.tree().nodeSize([45, 200]);
  const treeData = treeLayout(root);
  const nodes = treeData.descendants();
  const links = treeData.descendants().slice(1);

  nodes.forEach(d => { d.y = d.depth * 220; });

  // NODES
  const node = g.selectAll('g.node').data(nodes, d => d.id);

  const nodeEnter = node.enter().append('g')
    .attr('class', d => {
      const lvl = d.depth === 0 ? 'node-root' : `node-l${Math.min(d.depth, 4)}`;
      return `node ${lvl}`;
    })
    .attr('transform', () => `translate(${source.y0},${source.x0})`)
    .style('opacity', 0)
    .on('click', (e, d) => clickNode(d));

  nodeEnter.append('rect').attr('class', 'node-rect')
    .attr('y', -16).attr('height', 32).attr('rx', 16).attr('ry', 16);

  nodeEnter.append('text').attr('class', 'node-text')
    .attr('dy', '.35em').attr('x', 16)
    .text(d => d.data.name);

  nodeEnter.append('circle')
    .attr('class', d => d.data.type === 'file' ? 'content-indicator' : 'collapse-indicator')
    .attr('r', 0); // başlangıçta gizli, update'de ayarlanır

  const nodeUpdate = nodeEnter.merge(node);

  nodeUpdate.select('.node-rect')
    .attr('width', d => nodeWidth(d));

  nodeUpdate.select('circle')
    .attr('cx', d => nodeWidth(d) - 14)
    .attr('r', d => {
      if (d.data.type === 'file') return 4;
      if (d.children || d._children) return 3;
      return 0;
    });

  nodeUpdate.classed('kb-focus', d => activeKbNode && d.id === activeKbNode.id);

  nodeUpdate.transition().duration(dur)
    .attr('transform', d => `translate(${d.y},${d.x})`)
    .style('opacity', 1);

  node.exit().transition().duration(dur)
    .attr('transform', () => `translate(${source.y},${source.x})`)
    .style('opacity', 0).remove();

  // LINKS
  const link = g.selectAll('path.link').data(links, d => d.id);

  const diagFrom = { x: source.x0, y: source.y0 };
  link.enter().insert('path', 'g').attr('class', 'link')
    .attr('d', () => diagonal(diagFrom, diagFrom))
    .merge(link).transition().duration(dur)
    .attr('d', d => diagonal(d, d.parent));

  link.exit().transition().duration(dur)
    .attr('d', d => diagonal({ x: d.x, y: d.y }, { x: d.x, y: d.y }))
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

function diagonal(s, d) {
  const rw = d.data ? nodeWidth(d) : 0;
  const sx = s.y, sy = s.x;
  const tx = d.y + rw, ty = d.x;
  const mx = (sx + tx) / 2;
  return `M ${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}`;
}

// ================================================================
// TIKLAMA VE KLAVYE
// ================================================================
function clickNode(d) {
  activeKbNode = d;
  if (d.children) { d._children = d.children; d.children = null; }
  else if (d._children) { d.children = d._children; d._children = null; }
  update(d);
  if (d.data.type === 'file') showDetail(d);
}

function refreshViewportSize() {
  const panel = document.getElementById('mindmap-panel');
  if (!panel) return;
  const nextWidth = panel.clientWidth;
  const nextHeight = panel.clientHeight;
  if (Number.isFinite(nextWidth) && nextWidth > 0) width = nextWidth;
  if (Number.isFinite(nextHeight) && nextHeight > 0) height = nextHeight;
}

function ensureNodeVisible(node) {
  if (!node) return false;
  let changed = false;
  let p = node.parent;
  while (p) {
    if (p._children) {
      p.children = p._children;
      p._children = null;
      changed = true;
    }
    p = p.parent;
  }
  if (changed) update(root, true);
  return changed;
}

function panToNode(node, scale = 1.3, speed = 500) {
  refreshViewportSize();

  if (!node) return false;
  if (!svg || !svg.node()) return false;
  if (!Number.isFinite(scale)) scale = 1.3;
  if (!Number.isFinite(width) || !Number.isFinite(height)) return false;
  if (!Number.isFinite(node.x) || !Number.isFinite(node.y)) return false;

  svg.transition().duration(speed).call(
    zoomBehavior.transform,
    d3.zoomIdentity
      .translate(width / 2 - node.y * scale, height / 2 - node.x * scale)
      .scale(scale)
  );
  return true;
}

function panToNodeWhenReady(node, scale = 1.3, speed = 500, tries = 4) {
  if (panToNode(node, scale, speed)) return;
  if (tries <= 0) return;

  requestAnimationFrame(() => {
    refreshViewportSize();
    if (root && node && (!Number.isFinite(node.x) || !Number.isFinite(node.y))) {
      update(root, true);
    }
    panToNodeWhenReady(node, scale, speed, tries - 1);
  });
}

function syncActiveNodeFocus() {
  if (!g) return;
  g.selectAll('.node').classed('kb-focus', d => activeKbNode && d.id === activeKbNode.id);
}

// Klavye
let isDetailHovered = false;
document.getElementById('detail-panel').addEventListener('mouseenter', () => isDetailHovered = true);
document.getElementById('detail-panel').addEventListener('mouseleave', () => isDetailHovered = false);

document.addEventListener('keydown', e => {
  const searchInput = document.getElementById('search-input');
  const isSearchFocused = document.activeElement === searchInput;

  if (e.key === 'Escape') {
    closePanel();
    clearSearch();
    searchInput.blur();
    return;
  }

  if (isSearchFocused) {
    if (e.key === 'Enter') searchInput.blur();
    return;
  }

  if (isDetailHovered && !document.getElementById('detail-panel').classList.contains('closed')
    && ['ArrowUp', 'ArrowDown'].includes(e.key)) {
    e.preventDefault();
    document.getElementById('d-body').scrollBy({ top: e.key === 'ArrowDown' ? 80 : -80, behavior: 'auto' });
    return;
  }

  if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.key)) return;
  if (!root) return;
  if (!activeKbNode) activeKbNode = root;
  e.preventDefault();

  const siblings = activeKbNode.parent
    ? (activeKbNode.parent.children || activeKbNode.parent._children)
    : null;
  const idx = siblings ? siblings.indexOf(activeKbNode) : -1;
  let layoutChanged = false;
  let nodeChanged = false;

  if (e.key === 'ArrowRight') {
    if (activeKbNode._children) {
      activeKbNode.children = activeKbNode._children;
      activeKbNode._children = null;
      layoutChanged = true;
    } else if (activeKbNode.children?.length) {
      activeKbNode = activeKbNode.children[0];
      nodeChanged = true;
    }
  } else if (e.key === 'ArrowLeft') {
    if (activeKbNode.children) {
      activeKbNode._children = activeKbNode.children;
      activeKbNode.children = null;
      layoutChanged = true;
    } else if (activeKbNode.parent) {
      activeKbNode = activeKbNode.parent;
      nodeChanged = true;
    }
  } else if (e.key === 'ArrowUp' && siblings && idx > 0) {
    activeKbNode = siblings[idx - 1];
    nodeChanged = true;
  } else if (e.key === 'ArrowDown' && siblings && idx < siblings.length - 1) {
    activeKbNode = siblings[idx + 1];
    nodeChanged = true;
  } else if (e.key === 'Enter') {
    clickNode(activeKbNode);
    panToNode(activeKbNode, d3.zoomTransform(svg.node()).k, 200);
    return;
  }

  if (layoutChanged) {
    update(activeKbNode);
  } else {
    g.selectAll('.node').classed('kb-focus', d => activeKbNode && d.id === activeKbNode.id);
  }

  if (nodeChanged && activeKbNode.data.type === 'file') {
    if (!document.getElementById('detail-panel').classList.contains('closed')) {
      showDetail(activeKbNode);
    }
  }

  panToNode(activeKbNode, d3.zoomTransform(svg.node()).k, 150);
});

// ================================================================
// DETAY PANELİ — MARKDOWN FETCH
// ================================================================
async function showDetail(d) {
  if (d.data.type !== 'file') return;

  const panel = document.getElementById('detail-panel');
  panel.classList.remove('closed');

  // Hash güncelle
  if (d.data.slug) {
    history.replaceState(null, '', `#${d.data.slug}`);
  }

  // Breadcrumb
  const parts = [];
  let cur = d.parent;
  while (cur) {
    const id = cur.id;
    const name = cur.data.name;
    parts.unshift(`<span class="bc-link" data-nid="${id}">${name}</span>`);
    cur = cur.parent;
  }
  const bcEl = document.getElementById('d-bc');
  bcEl.innerHTML = parts.join('<span class="bc-sep">›</span>') || 'Ana Sayfa';

  // Breadcrumb tıklama
  bcEl.querySelectorAll('.bc-link').forEach(el => {
    el.addEventListener('click', () => clickBreadcrumb(parseInt(el.dataset.nid)));
  });

  document.getElementById('d-title').textContent = d.data.name;

  const body = document.getElementById('d-body');

  // Önbellekte varsa direkt göster
  if (mdCache.has(d.data.path)) {
    renderMarkdown(mdCache.get(d.data.path), body);
    return;
  }

  body.innerHTML = '<div class="detail-loading">Yükleniyor...</div>';

  try {
    const res = await fetch(d.data.path);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    mdCache.set(d.data.path, text);
    // Arama indeksine içeriği ekle
    const entry = SEARCH_INDEX.get(d.id);
    if (entry) entry.content = text.replace(/[#*`>_\[\]]/g, '');
    renderMarkdown(text, body);
  } catch (err) {
    body.innerHTML = `
      <div class="detail-error">
        Dosya yüklenemedi.<br><br>
        <code>${d.data.path}</code><br><br>
        <small>Hata: ${err.message}</small>
      </div>`;
  }
}

function renderMarkdown(text, container) {
  try {
    const html = DOMPurify.sanitize(marked.parse(text));
    container.innerHTML = `<div class="md">${html}</div>`;
    container.scrollTop = 0;
    addCopyButtons(container);
  } catch (err) {
    container.innerHTML = `<div class="detail-error">İçerik render edilemedi.<br><small>${err.message}</small></div>`;
  }
}

function addCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.parentElement.classList.contains('code-block-wrapper')) return;
    const wrap = document.createElement('div');
    wrap.className = 'code-block-wrapper';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Kopyala';
    btn.addEventListener('click', () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.innerText : pre.innerText).then(() => {
        btn.textContent = 'Kopyalandı!';
        btn.style.background = 'var(--accent2)';
        btn.style.color = '#fff';
        setTimeout(() => { btn.textContent = 'Kopyala'; btn.style.background = ''; btn.style.color = ''; }, 2000);
      });
    });
    wrap.appendChild(btn);
  });
}

function clickBreadcrumb(id) {
  const node = findNodeById(id);
  if (!node) return;
  activeKbNode = node;
  let p = node;
  while (p) {
    if (p._children) { p.children = p._children; p._children = null; }
    p = p.parent;
  }
  update(root);
  syncActiveNodeFocus();
  panToNodeWhenReady(node, 1.1, 500);
  closePanel();
}

function closePanel() {
  document.getElementById('detail-panel').classList.add('closed');
  history.replaceState(null, '', window.location.pathname + window.location.search);
  document.querySelectorAll('.active-snippet').forEach(el => el.classList.remove('active-snippet'));
  g && g.selectAll('.node').classed('kb-focus', false);
}

// ================================================================
// HASH İLE DERİN LİNK
// ================================================================
function checkUrlHash() {
  const hash = window.location.hash.substring(1);
  if (!hash) return;
  const target = findNodeBySlug(decodeURIComponent(hash));
  if (target) {
    setTimeout(() => focusAndOpen(target.id), 400);
  } else {
    console.warn(`Hash "${hash}" için node bulunamadı.`);
  }
}

// ================================================================
// ZOOM KONTROLLERI
// ================================================================
document.getElementById('btn-zoom-in').addEventListener('click', () =>
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.2));
document.getElementById('btn-zoom-out').addEventListener('click', () =>
  svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.8));
document.getElementById('btn-zoom-reset').addEventListener('click', resetMap);
document.getElementById('btn-toggle-all').addEventListener('click', () => {
  if (isAllExpanded) { root.children && root.children.forEach(collapse); isAllExpanded = false; }
  else { expandAll(root); isAllExpanded = true; }
  update(root);
});
document.getElementById('btn-close-detail').addEventListener('click', closePanel);

function resetMap() {
  root && root.children && root.children.forEach(collapse);
  update(root, true);
  refreshViewportSize();
  svg.transition().duration(500).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(width / 4, height / 2).scale(0.9)
  );
  activeKbNode = root;
  g && g.selectAll('.node').classed('kb-focus', false);
}

// ================================================================
// ARAMA
// ================================================================
function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

let searchTimeout;
document.getElementById('search-input').addEventListener('input', function () {
  const val = this.value;
  document.getElementById('search-clear').style.display = val.length > 0 ? 'block' : 'none';
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(triggerSearch, 60);
});

document.getElementById('search-clear').addEventListener('click', clearSearch);
document.getElementById('search-panel-close').addEventListener('click', clearSearch);


async function warmSearchIndex() {
  if (searchWarmupDone) return;
  if (searchWarmupPromise) return searchWarmupPromise;

  const fileEntries = [];
  SEARCH_INDEX.forEach((entry, nodeId) => {
    if (entry && entry.type === 'file' && entry.path && entry.content === null) {
      fileEntries.push({ nodeId, entry });
    }
  });

  searchWarmupPromise = (async () => {
    for (const item of fileEntries) {
      try {
        const res = await fetch(item.entry.path);
        if (!res.ok) continue;
        const text = await res.text();
        item.entry.content = text.replace(/[#*`>_\[\]]/g, '');
        if (!mdCache.has(item.entry.path)) {
          mdCache.set(item.entry.path, text);
        }
      } catch (_) {
        // Arama için yüklenemeyen dosyayı atla; UI kırılmasın
      }
    }
    searchWarmupDone = true;
  })();

  try {
    await searchWarmupPromise;
  } finally {
    searchWarmupPromise = null;
  }
}

async function ensureSearchReadyIfNeeded(term, panel, results) {
  if (searchWarmupDone) return;

  panel.classList.remove('closed');
  document.getElementById('search-count').textContent = 'İndeks hazırlanıyor...';
  results.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px;">Not içerikleri ilk arama için hazırlanıyor...</div>';

  await warmSearchIndex();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-panel').classList.add('closed');
  if (svg) {
    svg.selectAll('.node').classed('search-match', false);
    svg.selectAll('.link').classed('highlighted', false);
  }
}

async function triggerSearch() {
  if (!root) return;
  const term = document.getElementById('search-input').value.toLowerCase().trim();
  const panel = document.getElementById('search-panel');
  const results = document.getElementById('search-results');

  svg.selectAll('.node').classed('search-match', false);
  svg.selectAll('.link').classed('highlighted', false);

  if (term.length < 1) { panel.classList.add('closed'); return; }
  panel.classList.remove('closed');

  const mySearchToken = ++searchRequestToken;
  await ensureSearchReadyIfNeeded(term, panel, results);
  if (mySearchToken !== searchRequestToken) return;

  const currentTerm = document.getElementById('search-input').value.toLowerCase().trim();
  if (currentTerm.length < 1) { panel.classList.add('closed'); return; }

  const safeTerm = escapeRegExp(currentTerm);
  const regex = new RegExp(`(${safeTerm})`, 'gi');
  let totalMatches = 0;
  let html = '';
  const matchedNodes = [];

  getAllNodes(root).forEach(d => {
    const entry = SEARCH_INDEX.get(d.id);
    if (!entry) return;

    const snippets = [];
    const nameMatch = entry.name.toLowerCase().includes(currentTerm);
    if (nameMatch) snippets.push(entry.name);

    // Cache'e alınmış içeriklerde ara
    if (entry.content) {
      const lower = entry.content.toLowerCase();
      let idx = lower.indexOf(currentTerm);
      let count = 0;
      while (idx !== -1 && count < 3) {
        const start = Math.max(0, idx - 30);
        const end = Math.min(entry.content.length, idx + currentTerm.length + 50);
        let snip = entry.content.substring(start, end);
        if (start > 0) snip = '…' + snip;
        if (end < entry.content.length) snip = snip + '…';
        snippets.push(snip);
        idx = lower.indexOf(currentTerm, idx + currentTerm.length);
        count++;
      }
    }

    if (snippets.length === 0) return;

    totalMatches += snippets.length;
    matchedNodes.push(d);

    html += `<div class="search-group">
      <div class="search-group-title" data-nid="${d.id}">
        <span><span style="color:var(--text-dim);font-size:10px;">›</span> ${d.data.name}</span>
        <span class="badge">${snippets.length}</span>
      </div>`;

    snippets.forEach(text => {
      const highlighted = text.replace(regex, '<span class="highlight">$1</span>');
      html += `<div class="search-snippet" data-nid="${d.id}">${highlighted}</div>`;
    });

    html += `</div>`;
  });

  document.getElementById('search-count').textContent = `${totalMatches} Sonuç`;
  results.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px;">Sonuç bulunamadı.</div>';

  // Tıklama eventleri
  results.querySelectorAll('[data-nid]').forEach(el => {
    el.addEventListener('click', () => {
      results.querySelectorAll('.active-snippet').forEach(x => x.classList.remove('active-snippet'));
      el.classList.add('active-snippet');
      focusAndOpen(parseInt(el.dataset.nid));
    });
  });

  // Haritada işaretle
  if (matchedNodes.length > 0) {
    matchedNodes.forEach(tn => {
      let p = tn;
      while (p.parent) {
        if (p.parent._children) { p.parent.children = p.parent._children; p.parent._children = null; }
        p = p.parent;
      }
    });
    update(root, true);
    setTimeout(() => {
      matchedNodes.forEach(tn => {
        svg.selectAll('.node').filter(n => n.id === tn.id).classed('search-match', true);
        let c = tn;
        while (c.parent) {
          svg.selectAll('.link').filter(l => l && l.target && typeof l.target.id !== 'undefined' && l.target.id === c.id).classed('highlighted', true);
          c = c.parent;
        }
      });
    }, 60);
  }
}

function focusAndOpen(id) {
  const target = findNodeById(id);
  if (!target) return;

  activeKbNode = target;
  ensureNodeVisible(target);
  syncActiveNodeFocus();

  if (target.data.type === 'file') {
    showDetail(target);
  } else {
    closePanel();
    if (target._children) {
      target.children = target._children;
      target._children = null;
      update(target);
    }
    syncActiveNodeFocus();
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      panToNodeWhenReady(target, 1.3, 500);
    });
  });
}

// ================================================================
// PANEL RESIZE
// ================================================================
let isResizingLeft = false, isResizingRight = false;

document.getElementById('rsz-left').addEventListener('mousedown', e => {
  isResizingLeft = true; document.body.classList.add('resizing'); e.preventDefault();
});
document.getElementById('rsz-right').addEventListener('mousedown', e => {
  isResizingRight = true; document.body.classList.add('resizing'); e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (isResizingLeft) {
    let w = Math.max(200, Math.min(window.innerWidth / 2, e.clientX));
    document.documentElement.style.setProperty('--search-width', w + 'px');
  }
  if (isResizingRight) {
    let w = Math.max(300, Math.min(window.innerWidth * 0.7, window.innerWidth - e.clientX));
    document.documentElement.style.setProperty('--detail-width', w + 'px');
  }
});

document.addEventListener('mouseup', () => {
  if (isResizingLeft || isResizingRight) {
    isResizingLeft = isResizingRight = false;
    document.body.classList.remove('resizing');
  }
});
